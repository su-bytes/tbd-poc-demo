replicaCount: 3  # Use 3 for demo (cheaper than 15)

image:
  repository: localhost:32000/payment-service  # Local registry
  tag: v1.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: payment.local
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

features:
  retryEnabled: "false"  # Start disabled

monitoring:
  enabled: true
  scrapeInterval: 30s
